<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsimran Kaur Kohli | Singer & Music Educator</title>

    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS for Main Content Layout -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GSAP for Cinematic Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-black-brown: #0A0604;
            --bg-dark-espresso: #150B06;
            --bg-walnut: #221408;
            --bg-burnt-umber: #3A200E;

            --gold-dark: #8B6914;
            --gold-shadow: #B08A30;
            --gold-metallic: #D4AF5A;
            --gold-antique: #E0C06E;
            --gold-soft: #EDD48A;
            --gold-highlight: #F8EABA;

            --cinematic-bg-gradient: linear-gradient(180deg, #0A0604 0%, #150B06 40%, #1E1108 100%);
            --gold-glow: rgba(212, 175, 90, 0.3);
            --texture-overlay: rgba(200, 164, 90, 0.04);
            --deep-shadow: rgba(0, 0, 0, 0.85);

            --color-bg-dark: var(--bg-black-brown);
            --color-wood-dark: var(--bg-dark-espresso);
            --color-wood-light: var(--bg-walnut);
            --color-gold-base: var(--gold-soft);
            --color-gold-light: var(--gold-highlight);
            --color-gold-dark: var(--gold-dark);
            --color-velvet: var(--bg-burnt-umber);
            --color-shadow: var(--deep-shadow);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--cinematic-bg-gradient);
            background-attachment: fixed;
            color: var(--gold-soft);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('public/assets/cover/dskbg.png') no-repeat center center;
            background-size: cover;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Dramatic Bloom (Overlaying the background's light) */
        .spotlight {
            position: absolute;
            top: -10vh;
            left: -10vw;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle at 20% 20%, rgba(249, 229, 150, 0.4) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: screen;
            filter: blur(40px);
            z-index: 1;
        }

        .tanpura-container {
            position: absolute;
            left: 2vw;
            bottom: -5vh;
            width: 55vw;
            max-width: 700px;
            height: 95vh;
            opacity: 0;
            transform: translateY(30px);
            filter: drop-shadow(20px 20px 30px rgba(0, 0, 0, 0.9));
            display: flex;
            align-items: flex-end;
        }

        .tanpura-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Ensure the whole tanpura is visible without distortion */
            object-position: bottom left;
        }

        /* Velvet Curtains (Right) */
        .curtain-container {
            position: absolute;
            right: 0;
            top: 0;
            width: 45vw;
            height: 100vh;
            opacity: 0;
            transform-origin: top right;
            z-index: 5;
        }

        .curtain-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: right top;
            filter: drop-shadow(-20px 0px 30px rgba(0, 0, 0, 0.8));
        }

        /* Typography Layout */
        .typography-container {
            position: absolute;
            right: 15vw;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        /* Typography Layout */
        .typography-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 800px;
        }

        .lotus-top,
        .lotus-bottom {
            width: 220px;
            opacity: 0;
            transform: scale(0.8);
        }

        .lotus-top img,
        .lotus-bottom img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .lotus-top {
            margin-bottom: -50px;
        }

        .lotus-bottom {
            margin-top: 1rem;
        }

        .logo-hsk-wrapper {
            position: relative;
            margin-bottom: -150px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 750px;
            height: 750px;
        }

        .logo-hsk-img {
            width: 100%;
            max-width: 750px;
            height: auto;
            opacity: 0;
            transform: scale(0.9);
            filter: drop-shadow(0px 15px 50px rgba(0, 0, 0, 0.9)) brightness(1.1);
            z-index: 2;
        }



        .branding-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name-text {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 0.25em;
            color: var(--color-gold-light);
            text-transform: uppercase;
            margin-bottom: 1.2rem;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.9);
            white-space: nowrap;
        }

        .name-text span {
            opacity: 0;
            display: inline-block;
        }

        .subtitle-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 0.5em;
            color: #a38c5b;
            opacity: 0;
            transform: translateY(10px);
            text-transform: uppercase;
        }

        .logo-text {
            color: var(--gold-metallic);
        }

        .glow {
            box-shadow: 0 0 40px var(--gold-glow);
        }

        /* Gold Tint for Image Assets (Removed sepia/hue-rotate) */
        .gold-asset {
            filter: drop-shadow(0 0 15px var(--gold-glow));
        }

        .logo-hsk-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Subtle Light Sweep Overlay */
        .light-sweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.03), transparent);
            transform: skewX(-20deg);
            pointer-events: none;
            z-index: 1;
        }

        /* Single Decorative Vine behind Sitar */
        .vine-bg-left {
            position: absolute;
            left: -50px;
            top: 10%;
            height: 80vh;
            width: auto;
            opacity: 0;
            z-index: 0; /* Behind sitar */
            pointer-events: none;
            filter: sepia(1) saturate(2) hue-rotate(-15deg) brightness(0.6) blur(2px);
        }


        /* Reduced Motion Fallback */
        @media (prefers-reduced-motion: reduce) {
            #loader-wrapper {
                display: none !important;
            }

            body {
                overflow: auto;
            }
        }

        @media (max-width: 768px) {
            #loader-wrapper {
                background: url('public/assets/cover/dskbg.png') no-repeat center center;
                background-size: cover;
            }

            /* Stage elements become subtle background accents */
            .tanpura-container {
                left: -20vw;
                width: 55vw;
                bottom: 0;
                opacity: 0.12 !important;
                z-index: 1;
            }

            .curtain-container {
                right: -10vw;
                width: 50vw;
                height: 100vh;
                opacity: 0.15 !important;
                z-index: 1;
            }

            .curtain-container img {
                object-position: right top;
                object-fit: cover;
            }

            /* Center the branding — hero focus */
            .typography-container {
                width: 100vw;
                z-index: 10;
                padding: 0 24px;
                max-width: 100%;
            }

            .logo-hsk-wrapper {
                width: 320px;
                height: 320px;
                margin-bottom: -80px;
            }

            .name-text {
                font-size: 1.5rem;
                letter-spacing: 0.15em;
                margin-bottom: 0.8rem;
                white-space: normal;
                word-break: break-word;
                text-shadow: 2px 4px 20px rgba(0, 0, 0, 1);
            }

            .subtitle-text {
                font-size: 0.7rem;
                letter-spacing: 0.25em;
            }

            .lotus-top,
            .lotus-bottom {
                width: 140px;
            }

            .lotus-top {
                margin-bottom: -35px;
            }

            .lotus-bottom {
                margin-top: 0.5rem;
            }

            .vine-bg-left {
                display: none;
            }

            .spotlight {
                width: 80vw;
                height: 80vh;
                top: -20vh;
                left: -20vw;
                filter: blur(60px);
            }
        }

        /* Extra small screens (iPhone SE, etc.) */
        @media (max-width: 400px) {
            .logo-hsk-wrapper {
                width: 260px;
                height: 260px;
                margin-bottom: -60px;
            }

            .name-text {
                font-size: 1.25rem;
                letter-spacing: 0.1em;
            }

            .subtitle-text {
                font-size: 0.6rem;
                letter-spacing: 0.18em;
            }

            .lotus-top,
            .lotus-bottom {
                width: 110px;
            }

            .lotus-top {
                margin-bottom: -25px;
            }
        }
    </style>
</head>

<body>

    <!-- CINEMATIC LOADING SCREEN -->
    <div id="loader-wrapper">
        <canvas id="particles-canvas"></canvas>


        <div class="light-sweep" id="light-sweep"></div>
        <div class="spotlight" id="spotlight"></div>

        <!-- Left: Tanpura Image Asset -->
        <div class="tanpura-container" id="tanpura">
            <img src="public/assets/cover/tanpura.png" alt="Ornate Tanpura" />
        </div>

        <!-- Right: Velvet Fabric Image -->
        <div class="curtain-container" id="curtains">
            <img src="public/assets/cover/hsk_Fabric.png" alt="Velvet Fabric" />
        </div>

        <!-- Center: Typography & Branding matching hsk_loading_hero.png -->
        <div class="typography-container" id="typography">
            <!-- Top Lotus -->
            <div class="lotus-top" id="lotus-top">
                <img src="public/assets/cover/lotus.png" alt="Lotus Top" class="gold-asset" />
            </div>

            <div class="logo-hsk-wrapper" id="logo-wrapper">
                <img src="public/assets/cover/coverlogo.png" alt="HSK Logo" class="logo-hsk-img gold-asset" id="logo" />
            </div>

            <div class="branding-text">
                <div class="name-text logo-text" id="nameText">Harsimran Kaur Kohli</div>
                <div class="subtitle-text" id="subtitleText">SINGER & MUSIC EDUCATOR</div>
            </div>

            <!-- Bottom Lotus -->
            <div class="lotus-bottom" id="lotus-bottom">
                <img src="public/assets/cover/lotus_bottom.png" alt="Lotus Bottom" class="gold-asset" />
            </div>
        </div>
    </div>


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Check for reduced motion preference
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            if (prefersReducedMotion) {
                window.location.href = 'vanilla-portfolio.html';
                return;
            }

            // --- Pre-computation ---
            // Split name text into spans for staggered animation
            const nameContainer = document.getElementById('nameText');
            const nameString = nameContainer.innerText;
            nameContainer.innerHTML = '';
            nameString.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char; // preserve spaces
                nameContainer.appendChild(span);
            });

            // --- GSAP Timeline Setup ---
            const tl = gsap.timeline({
                onComplete: () => {
                    // Redirect to the main portfolio page
                    gsap.to("body", {
                        opacity: 0,
                        duration: 1,
                        ease: "power2.inOut",
                        onComplete: () => {
                            window.location.href = 'vanilla-portfolio.html';
                        }
                    });
                }
            });

            // Initial State
            gsap.set("#tanpura-glint", { backgroundPosition: "200% 0" });
            gsap.set(".lotus-top, .lotus-bottom", { opacity: 0, scale: 0.8, filter: "blur(10px)" });
            gsap.set(".logo-circle-frame", { rotation: -45, opacity: 0, scale: 1.2 });

            // The Reveal Sequence (Optimized: ~3.5s total)
            tl.to("#spotlight", { duration: 1.5, opacity: 1, scale: 1.2, ease: "power2.inOut" }, 0.3)
              .to("#tanpura", { duration: 1.5, opacity: 1, y: 0, ease: "power2.out" }, 0.3)
              .to("#curtains", { duration: 1.5, opacity: 1, ease: "power2.inOut" }, 0.5)
              .to("#lotus-top", { duration: 1, opacity: 1, scale: 1, filter: "blur(0px)", ease: "back.out(1.2)" }, 0.8)
              .to("#logo", { duration: 1, opacity: 1, scale: 1, ease: "power3.out" }, 1.0)
              .to("#nameText span", { duration: 0.5, opacity: 1, y: 0, stagger: 0.02, ease: "power2.out" }, 1.2)
              .to("#subtitleText", { duration: 0.8, opacity: 1, y: 0, ease: "power2.out" }, 1.8)
              .to("#lotus-bottom", { duration: 1, opacity: 1, scale: 1, filter: "blur(0px)", ease: "back.out(1.2)" }, 1.5);



            // Ambient floating effect for lotuses
            to(".lotus-top, .lotus-bottom", {
                duration: 3,
                y: "-=10",
                yoyo: true,
                repeat: -1,
                ease: "sine.inOut"
            }, 4.5);

            // Exit sequence (Cinematic blowout before redirect)
            tl.add("exit", 3.5);

            tl.to("#curtains", {
                duration: 2,
                x: "100%",
                skewX: -5,
                opacity: 0,
                ease: "power3.inOut"
            }, "exit")
                .to("#tanpura", {
                    duration: 1.5,
                    x: "-20vw",
                    opacity: 0,
                    ease: "power3.in"
                }, "exit")
                .to("#typography", {
                    duration: 1.2,
                    scale: 1.2,
                    opacity: 0,
                    ease: "power2.in"
                }, "exit")
                .to("#spotlight", {
                    duration: 1.5,
                    opacity: 1,
                    scale: 3,
                    backgroundColor: "rgba(255, 255, 255, 0.8)",
                    ease: "power4.in"
                }, "exit")
                .to("#loader-wrapper", {
                    duration: 1.5,
                    opacity: 0,
                    ease: "power4.inOut"
                }, "exit+=0.5");

            // 6. Light Sweep Animation
            gsap.to("#light-sweep", {
                duration: 8,
                left: "200%",
                repeat: -1,
                ease: "none",
                delay: 1
            });

            // 7. Particle System Implementation
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x > canvas.width) this.x = 0;
                    else if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    else if (this.y < 0) this.y = canvas.height;
                }

                draw() {
                    ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                for (let i = 0; i < 80; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();
        });
    </script>
</body>

</html>
